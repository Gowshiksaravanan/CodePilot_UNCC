provider:
  name: openai                   # ollama | groq | openai
  model: gpt-4o-mini
  # Cloud provider priority: OPENAI_API_KEY > GROQ_API_KEY > Ollama
  # If both keys exist, OpenAI is used for complex/implement/judge tasks
  # Simple tasks always use Ollama (local, fast)

project_path: ../project         # target project directory (relative to CodePilot_UNCC/)

execution_mode: auto             # confirm | auto

checkpointing:
  enabled: true
  path: .codepilot/checkpoints.pkl    # resolved relative to agent root

mcp_servers:
  filesystem:
    command: npx
    args: ["@modelcontextprotocol/server-filesystem", "."]
  tavily:
    command: npx
    args: ["tavily-mcp"]
  rag:
    command: ./venv/bin/python
    args: ["mcp_servers/rag_server/server.py"]
